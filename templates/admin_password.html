{% extends "base.html" %}
{% block title %}Change Password | IntelliMF{% endblock %}
{% block content %}
<section class="section-header">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>Change Password</h1>
    <p class="muted">Signed in as {{ admin_username }}.</p>
  </div>
</section>

<section class="panel narrow-panel">
  <div class="panel-heading">
    <h2>Update Password</h2>
    <p>Use a secure password with at least 6 characters.</p>
  </div>
  <form class="stack-form" action="{{ url_for('admin_password') }}" method="post">
    <label>
      Current Password
      <input type="password" name="current_password" required>
    </label>
    <label>
      New Password
      <input type="password" name="new_password" minlength="6" required>
    </label>
    <label>
      Confirm New Password
      <input type="password" name="confirm_password" minlength="6" required>
    </label>
    <button type="submit">Update Password</button>
  </form>
</section>
{% endblock %}
